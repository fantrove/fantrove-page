<body style="opacity:0">
  <!-- ════════════════════════════════════════════════
       APP ROOT WRAPPER
       data-page ใช้สำหรับ CSS scoping ในอนาคต
  ════════════════════════════════════════════════ -->
  <div id="fv-app" class="fv-app" data-page="home">

    <!-- SEO h1 — อ่านได้ทันทีโดย Crawler, ซ่อนจากผู้ใช้ -->
    <h1 class="fv-sr-only">Fantrove — Emoji and Symbol Collection | Free Copy Tool</h1>

    <!-- Navigation Layer (JS inject bottom nav ที่นี่) -->
    <div id="fv-nav-layer"></div>

    <!-- Page Shell -->
    <div class="fv-page-shell">
      <main id="fv-main">

        <div class="blur-overlay-top" style="opacity:0;"></div>

        <div class="hio">
          <div class="img-d1">
            <img src="/assets/images/j.png" alt="FanTrove Hub — Emoji and Symbol Collection" />
          </div>
        </div>

        <!-- HERO: visual display (ไม่ใช่ heading — ใช้ div แทน h) -->
        <section class="hero nob">
          <!-- aria-hidden เพราะ h1 จริงอยู่ด้านบนแล้ว -->
          <div class="fv-hero-display h1"
               data-translate="home-hero-title"
               aria-hidden="true"></div>
          <p class="lead" data-translate="home-hero-desc">
            <span></span> <strong></strong> <strong></strong>
          </p>
          <div class="hero-btns">
            <a wave
              href="/data/verse/discover/?type=emojis__&page=1"
              class="button button-secondary oc"
              data-translate="home-hero-btn-emoji">
              <span class="btn-icon" data-translate-slot="1">
                <img class="im" src="https://twemoji.maxcdn.com/v/latest/svg/2764.svg" alt="heart" width="20" height="20">
              </span>
              <span></span>
            </a>
            <a wave
              href="/data/verse/discover/?type=symbols__&page=1"
              class="button button-secondary oc"
              data-translate="home-hero-btn-symbol">
              <span class="btn-icon" data-translate-slot="1">✦</span>
              <span></span>
            </a>
          </div>
        </section>

        <div class="container">
          <!-- DYNAMIC CONTENT (home.js renders here) -->
          <div id="app"></div>

          <!-- FEATURES SECTION -->
          <section aria-labelledby="features-heading">
            <h2 id="features-heading" data-translate="home-features-title"></h2>
          </section>

          <section>
            <span class="feature-icon" aria-hidden="true">🔍</span>
            <div>
              <h3 data-translate="home-feature1-title"></h3>
              <div data-translate="home-feature1-desc"></div>
            </div>
          </section>
          <section>
            <span class="feature-icon" aria-hidden="true">📋</span>
            <div>
              <h3 data-translate="home-feature2-title"></h3>
              <div data-translate="home-feature2-desc"></div>
            </div>
          </section>
          <section class="m">
            <span class="feature-icon" aria-hidden="true">✨</span>
            <div>
              <h3 data-translate="home-feature3-title"></h3>
              <div data-translate="home-feature3-desc"></div>
            </div>
          </section>

          <!-- FAQ SECTION -->
          <section aria-labelledby="faq-heading">
            <h2 id="faq-heading" data-translate="home-faq-title"></h2>
          </section>

          <section class="o">
            <input type="checkbox" id="faq1" class="faq-toggle" hidden />
            <label for="faq1" class="faq-question" data-translate="home-faq-q1"></label>
            <div class="faq-answer" role="region" aria-labelledby="faq1">
              <div data-translate="home-faq-a1"></div>
            </div>
          </section>
          <section class="o">
            <input type="checkbox" id="faq2" class="faq-toggle" hidden />
            <label for="faq2" class="faq-question" data-translate="home-faq-q2"></label>
            <div class="faq-answer" role="region" aria-labelledby="faq2">
              <div data-translate="home-faq-a2"></div>
            </div>
          </section>
          <section class="o">
            <input type="checkbox" id="faq3" class="faq-toggle" hidden />
            <label for="faq3" class="faq-question" data-translate="home-faq-q3"></label>
            <div class="faq-answer" role="region" aria-labelledby="faq3">
              <div data-translate="home-faq-a3"></div>
            </div>
          </section>
        </div><!-- /.container -->

      </main>

      <!-- Footer inject by JS -->
      <div id="fv-footer-mount"></div>
    </div><!-- /.fv-page-shell -->
