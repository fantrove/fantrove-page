<!DOCTYPE html>

<head>
    
<!--
  lang-early-set.html — inline script สำหรับใส่ใน <head> บรรทัดแรกสุด (v3.1, 1.0.9)

  เพิ่มความแข็งแกร่งจาก v3:
    - try/catch ทุก operation — ถ้า error ครึ่งคัน signal ที่เหลือยังทำงานได้
    - เพิ่ม notranslate class บน <html> ทันที (ไม่รอ body)
    - MutationObserver guard — ถ้า JS ตัวอื่นลบ translate="no" ออก จะ restore ทันที
    - เพิ่ม <meta http-equiv="Content-Language"> เป็น signal เพิ่มเติม
    - body notranslate class — set ทันทีที่ body มีอยู่ใน DOM

  หมายเหตุ: script นี้คือ fallback สำหรับ browser โดยตรง
  _middleware.js ทำสิ่งเดียวกันที่ server level ก่อนหน้านี้แล้ว
-->
<script data-lang-internal>
(function () {
  try {
    var h = document.documentElement;
    var m = location.pathname.match(/^\/(en|th)(\/|$)/);
    var l = m ? m[1] : 'en';

    // 1. lang attribute
    try { h.setAttribute('lang', l); } catch(e) {}

    // 2. translate="no"
    try { h.setAttribute('translate', 'no'); } catch(e) {}

    // 3. notranslate class บน <html>
    try {
      var hc = h.getAttribute('class') || '';
      if (hc.indexOf('notranslate') === -1)
        h.setAttribute('class', hc ? hc + ' notranslate' : 'notranslate');
    } catch(e) {}

    // 4. meta tags (google notranslate + Content-Language)
    try {
      var gm = document.createElement('meta');
      gm.name = 'google'; gm.content = 'notranslate';
      document.head.appendChild(gm);
    } catch(e) {}
    try {
      var cl = document.createElement('meta');
      cl.httpEquiv = 'Content-Language'; cl.content = l;
      document.head.appendChild(cl);
    } catch(e) {}

    // 5. body notranslate class — set ทันทีที่ body parse เสร็จ
    //    ถ้า body ยังไม่มีตอนนี้ → ใช้ MutationObserver จับ
    function _setBody() {
      try {
        var b = document.body;
        if (!b) return false;
        var bc = b.getAttribute('class') || '';
        if (bc.indexOf('notranslate') === -1)
          b.setAttribute('class', bc ? bc + ' notranslate' : 'notranslate');
        return true;
      } catch(e) { return false; }
    }

    if (!_setBody()) {
      var bodyObs = new MutationObserver(function(_, obs) {
        if (_setBody()) obs.disconnect();
      });
      bodyObs.observe(document.documentElement, { childList: true });
    }

    // 6. MutationObserver guard — ป้องกัน JS อื่นลบ translate="no" ออก
    //    observe แค่ attribute changes บน <html> tag
    try {
      var guard = new MutationObserver(function(mutations) {
        mutations.forEach(function(mut) {
          if (mut.attributeName === 'translate') {
            var cur = h.getAttribute('translate');
            if (cur !== 'no') h.setAttribute('translate', 'no');
          }
          if (mut.attributeName === 'lang') {
            var cur = h.getAttribute('lang');
            if (cur !== l) h.setAttribute('lang', l);
          }
        });
      });
      guard.observe(h, { attributes: true, attributeFilter: ['translate', 'lang'] });
    } catch(e) {}

  } catch(e) {}
})();
</script>
