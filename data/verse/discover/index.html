  <!-- ═════════════════════════════════════════════════════════════════════════
       BOOT LOADER — inline CSS + HTML rendered immediately
       ═════════════════════════════════════════════════════════════════════════
       v2.1: เหลือแค่ ring spinner + ข้อความ "Loading…" / "กำลังโหลด…"
             ไม่มี phase dots, ไม่มี sub-message, ไม่มี step indicators

       Pattern: "Cover-all initial loader" (Spotify/TikTok app shell pattern)
         • Fullscreen overlay covering header + content
         • Ring spinner (SVG, CSS-animated)
         • Single localized message
         • Auto-dismissed by NavCore InitService.start() finally block
         • Safety timeout: 12s auto-hide (in case NavCore fails to load)
       ═════════════════════════════════════════════════════════════════════════ -->
  <style>
    /* ── Boot loader keyframes (outside @layer for max compat) ───────────── */
    @keyframes _fv_boot_spin { to { transform: rotate(360deg); } }

    /* ── Boot loader overlay ─────────────────────────────────────────────── */
    #fv-boot-loader {
      position: fixed;
      inset: 0;
      z-index: 99998;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      background: var(--fv-surface-page, #ffffff);
      contain: layout style;
      transform: translateZ(0);
      font-family: var(--fv-font-stack, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      box-sizing: border-box;
      transition: opacity 220ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    #fv-boot-loader.fv-boot-hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Spinner (matches FVL ring style) ────────────────────────────────── */
    #fv-boot-loader .fv-boot-spinner {
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      will-change: transform;
    }
    #fv-boot-loader .fv-boot-spinner svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      display: block;
    }
    #fv-boot-loader .fv-boot-track {
      stroke: #e8f5ef;
      stroke-width: 3.5;
      fill: none;
    }
    #fv-boot-loader .fv-boot-arc {
      stroke: var(--fv-brand-teal-light, #13b47f);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-dasharray: 88 132;
      fill: none;
      transform-box: fill-box;
      transform-origin: center;
      will-change: transform;
      animation: _fv_boot_spin 0.7s linear infinite;
    }

    /* ── Single loading message ─────────────────────────────────────────── */
    #fv-boot-loader .fv-boot-msg {
      font-size: 16px;
      font-weight: 600;
      color: #3c4043;
      text-align: center;
      line-height: 1.4;
      min-width: 100px;
      min-height: 1.4em;
    }

    /* ── prefers-reduced-motion ──────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      #fv-boot-loader .fv-boot-arc { animation: none; }
      #fv-boot-loader.fv-boot-hidden { transition: none; }
    }
  </style>

  <!-- ═════════════════════════════════════════════════════════════════════════
       BOOT LOADER — shown immediately, covers everything until NavCore ready
       v2.1: เหลือแค่ spinner + ข้อความเดียว
       ═════════════════════════════════════════════════════════════════════════ -->
  <div id="fv-boot-loader" role="status" aria-live="polite" aria-label="Loading">
    <div class="fv-boot-spinner" aria-hidden="true">
      <svg viewBox="0 0 52 52">
        <circle class="fv-boot-track" cx="26" cy="26" r="22"></circle>
        <circle class="fv-boot-arc" cx="26" cy="26" r="22"></circle>
      </svg>
    </div>
    <div class="fv-boot-msg" id="fv-boot-msg">Loading…</div>
  </div>

  <script>
    /* ── Boot loader controller (v2.1 — minimal) ────────────────────────────
       Why this script is inline + synchronous in <body>:
         It must run BEFORE NavCore finishes loading, so it can:
           1. Pick up the user's selected language for the message
           2. Expose window.__removeBootLoader() for InitService to call

       v2.1: ไม่มี phase tracking แล้ว — แค่ตั้งข้อความ "Loading…" ตามภาษา
       ─────────────────────────────────────────────────────────────────────── */
    (function () {
      'use strict';
      if (window.__bootLoaderInstalled) return;
      window.__bootLoaderInstalled = true;

      var MSG = {
        en: 'Loading…',
        th: 'กำลังโหลด…',
      };

      function getLang() {
        try {
          return (localStorage.getItem('selectedLang') || 'en');
        } catch (_) { return 'en'; }
      }

      function init() {
        var lang = getLang();
        var msgEl = document.getElementById('fv-boot-msg');
        if (msgEl) msgEl.textContent = MSG[lang] || MSG.en;
      }

      // Expose remove function for InitService.start() finally block
      window.__removeBootLoader = function () {
        var el = document.getElementById('fv-boot-loader');
        if (!el) return;
        el.classList.add('fv-boot-hidden');
        setTimeout(function () {
          try {
            if (el.parentNode) el.parentNode.removeChild(el);
          } catch (_) {}
        }, 250); // wait for fade-out transition
      };

      // Safety timeout: if NavCore hasn't taken over after 12s, force hide
      // WHY 12s: covers slow 3G + cold cache + heavy CDN. If NavCore truly
      //   failed to load, we don't want the user stuck on a loader forever.
      setTimeout(function () {
        var el = document.getElementById('fv-boot-loader');
        if (el && !el.classList.contains('fv-boot-hidden')) {
          // Check if NavCore has actually taken over (FVL active)
          var fvlActive = false;
          try {
            if (window.FVL && typeof window.FVL.isActive === 'function') {
              fvlActive = window.FVL.isActive('fvl-default-fullscreen');
            }
          } catch (_) {}
          // Only force-hide if NavCore has taken over OR if 12s truly elapsed
          // If NavCore is still loading, give it 6 more seconds
          if (fvlActive || !window._navCore_bootstrapping) {
            window.__removeBootLoader();
          } else {
            setTimeout(function () {
              window.__removeBootLoader();
            }, 6000);
          }
        }
      }, 12000);

      // Initialize message on DOMContentLoaded (or now if already loaded)
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init, { once: true });
      } else {
        init();
      }
    })();
  </script>
