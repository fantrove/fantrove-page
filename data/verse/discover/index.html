  <!--
    CSS LOADING ORDER (3 ไฟล์แยกชัดเจน):
    1. loading.css   — overlay + notification (preload: ต้องพร้อมก่อน JS แสดง overlay)
    2. header.min.css — header + nav เท่านั้น
    3. styles.min.css — main content styles

    loading.css ใช้ preload + onload pattern เหมือนกัน
    แต่ priority สูงกว่าเพราะ overlay แสดงทันทีที่ JS โหลด
  -->

  <!-- loading.css: preload ก่อนเลย — overlay ต้องพร้อมทันที -->
  <link rel="preload" href="/assets/css/loading.css" as="style" onload="this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="/assets/css/loading.css" /></noscript>

  <!-- header.min.css -->
  <link rel="preload" href="/assets/css/header.min.css" as="style" onload="this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="/assets/css/header.min.css" /></noscript>

  <!-- styles.min.css -->

    gtag('js', new Date());
    gtag('config', 'G-R4DGR81NZ6');
