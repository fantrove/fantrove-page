      Minimal critical inline CSS:
      - NO body opacity:0 — causes full repaint + JS overhead on reveal
      - header min-height reserves space → prevents CLS
      - Smooth scroll on html, overscroll-behavior prevents bounce jank
    */
    html {
      background: #fff;
      overscroll-behavior-y: none;
    }
    body {
      margin: 0;
      -webkit-overflow-scrolling: touch;
    }
    header { min-height: 88px; contain: layout style; }

  <!--
    SCRIPT STRATEGY:
    - Language scripts: sync (must run before first paint to avoid flicker)
    - render-engine.js: sync (assumed needed for first paint)

  -->

  <script src="/assets/js/render-engine.js"></script>
